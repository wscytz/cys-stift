name: stable-release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  verify:
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: stable tag matches package version
        run: test "$GITHUB_REF_NAME" = "v$(node -p "require('./package.json').version")"
      - run: pnpm docs:links
      - name: generated version sync
        run: |
          node scripts/gen-version.mjs
          git diff --exit-code -- \
            apps/web/src/lib/version.ts \
            apps/web/package.json \
            apps/desktop/package.json \
            apps/desktop/src-tauri/Cargo.toml \
            apps/desktop/src-tauri/Cargo.lock \
            apps/desktop/src-tauri/tauri.conf.json
      - run: pnpm -r lint
      - run: pnpm -r test
      - run: pnpm --filter web build

  windows:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - run: pnpm install --frozen-lockfile
      - name: build Windows NSIS installer
        run: pnpm --filter desktop exec tauri build --ci --bundles nsis
      - uses: actions/upload-artifact@v5
        with:
          name: windows-nsis
          if-no-files-found: error
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

  macos:
    needs: verify
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - run: pnpm install --frozen-lockfile
      - name: build ad-hoc signed Apple Silicon DMG
        run: >-
          pnpm --filter desktop exec tauri build --ci --bundles dmg
          --config '{"bundle":{"active":true,"macOS":{"signingIdentity":"-"}}}'
      - name: validate DMG and embedded app
        shell: bash
        run: |
          set -euo pipefail
          dmg="$(find apps/desktop/src-tauri/target/release/bundle/dmg -name '*.dmg' -print -quit)"
          test -n "$dmg"
          case "$dmg" in
            *_aarch64.dmg) ;;
            *) echo "expected an Apple Silicon DMG, got $dmg" >&2; exit 1 ;;
          esac
          hdiutil verify "$dmg"
          mountpoint="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mountpoint" -force >/dev/null 2>&1 || true
            rmdir "$mountpoint" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          hdiutil attach -nobrowse -readonly -mountpoint "$mountpoint" "$dmg"
          codesign --verify --deep --strict --verbose=4 "$mountpoint/cys-stift.app"
      - uses: actions/upload-artifact@v5
        with:
          name: macos-arm64-dmg
          if-no-files-found: error
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

  release:
    needs: [windows, macos]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          name: windows-nsis
          path: release-assets/windows
      - uses: actions/download-artifact@v5
        with:
          name: macos-arm64-dmg
          path: release-assets/macos
      - name: generate asset checksums
        run: |
          {
            (cd release-assets/windows && sha256sum *.exe)
            (cd release-assets/macos && sha256sum *.dmg)
          } > release-assets/SHA256SUMS.txt
      - name: publish stable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          title="cy's Stift $tag"
          assets=(
            release-assets/windows/*.exe
            release-assets/macos/*.dmg
            release-assets/SHA256SUMS.txt
          )

          # A failed upload may leave a draft behind. Make reruns idempotent:
          # replace all assets, then publish the same verified tag.
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$title" \
              --notes-file .github/release-stable.md \
              --draft=false \
              --prerelease=false \
              --latest
          else
            gh release create "$tag" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$title" \
              --notes-file .github/release-stable.md \
              --latest
          fi
