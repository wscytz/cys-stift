name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      # 不指定 version:自动从 package.json 的 packageManager(pnpm@9.15.0)读,
      # 避免与 packageManager 字段冲突(ERR_PNPM_BAD_PM_VERSION)。
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # v0.37.0: a real typecheck gate. The package `test` scripts are just
      # `vitest run` (no tsc), and vitest does not typecheck — so type errors
      # in packages/domain, db, ui were silently passing. This step runs the
      # `lint` script (tsc --noEmit) of the three typed packages. web is
      # typechecked by `next build` below; its `next lint` is interactive and
      # not used here.
      - name: typecheck (domain / db / ui — tsc --noEmit)
        run: |
          pnpm --filter domain lint
          pnpm --filter @cys-stift/db lint
          pnpm --filter @cys-stift/ui lint

      - name: domain test
        run: pnpm --filter domain test

      - name: db test
        run: pnpm --filter db test

      - name: web build (includes web typecheck)
        run: pnpm --filter web build

  build-tauri-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: build tauri (windows)
        working-directory: apps/desktop
        run: pnpm tauri build

      - name: upload windows exe
        uses: actions/upload-artifact@v4
        with:
          name: cy's-stift-windows
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
