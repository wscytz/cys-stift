name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      # 不指定 version:自动从 package.json 的 packageManager(pnpm@9.15.0)读,
      # 避免与 packageManager 字段冲突(ERR_PNPM_BAD_PM_VERSION)。
      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: public docs links
        run: pnpm docs:links

      - name: generated version sync
        run: |
          node scripts/gen-version.mjs
          git diff --exit-code -- \
            apps/web/src/lib/version.ts \
            apps/web/package.json \
            apps/desktop/package.json \
            apps/desktop/src-tauri/Cargo.toml \
            apps/desktop/src-tauri/Cargo.lock \
            apps/desktop/src-tauri/tauri.conf.json

      # v0.37.0: a real typecheck gate. The package `test` scripts are just
      # `vitest run` (no tsc), and vitest does not typecheck — so type errors
      # in packages/domain, db, ui were silently passing. This step runs the
      # `lint` script (tsc --noEmit) of the three typed packages. web is
      # typechecked by `next build` below; its `next lint` is interactive and
      # not used here.
      - name: typecheck (domain / db / ui — tsc --noEmit)
        run: |
          pnpm --filter domain lint
          pnpm --filter @cys-stift/db lint
          pnpm --filter @cys-stift/ui lint

      - name: domain test
        run: pnpm --filter domain test

      - name: db test
        run: pnpm --filter db test

      - name: canvas-engine test
        run: pnpm --filter @cys-stift/canvas-engine test

      - name: web test
        run: pnpm --filter web test

      - name: web build (includes web typecheck)
        run: pnpm --filter web build
  build-tauri-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - run: pnpm install --frozen-lockfile

      - name: build tauri (windows)
        working-directory: apps/desktop
        # --ci: 跳过交互式提示。
        # --bundles nsis: 只生成 NSIS installer。tauri.conf.json 的
        #   "targets":"all" 在 Windows 上会同时生成 NSIS + MSI,而 MSI
        #   需要 WiX 工具链——这是 Windows CI 最常见的 bundling 失败点。
        #   命令行覆盖只影响 CI,不改本地 macOS build(本地仍生成 .app/.dmg)。
        run: pnpm tauri build --ci --bundles nsis

      - name: upload windows installer
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: cy-s-stift-windows
          if-no-files-found: warn
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
